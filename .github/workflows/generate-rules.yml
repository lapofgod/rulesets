name: Generate Rules

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/generate-rules.yml"
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install sing-box
        run: |
          go install github.com/sagernet/sing-box/cmd/sing-box@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Create venv
        run: uv venv .venv

      - name: Install dependencies
        run: uv sync --python .venv/bin/python

      - name: Generate
        run: .venv/bin/python scripts/generate_rules.py

      - name: Commit and push
        env:
          TARGET_BRANCH: generated
        run: |
          set -euo pipefail

          PUBLISH_DIR="$(mktemp -d)"
          cp -a generated/. "$PUBLISH_DIR"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi

          for entry in "$PUBLISH_DIR"/* "$PUBLISH_DIR"/.[!.]* "$PUBLISH_DIR"/..?*; do
            [ -e "$entry" ] || continue
            name="$(basename "$entry")"
            [ "$name" = ".git" ] && continue
            cp -a "$entry" ./
          done

          git add -A .

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: auto-generate rules"
          git push origin HEAD:"$TARGET_BRANCH"
