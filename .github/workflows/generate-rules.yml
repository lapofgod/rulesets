name: Generate Rules

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '15 2 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Restore runtime cache
        uses: actions/cache@v4
        with:
          path: cache
          key: rulesets-runtime-cache-${{ runner.os }}-v1

      - name: Cache sing-box
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/sing-box
          key: sing-box-${{ runner.os }}-v1.9.1

      - name: Install sing-box
        run: |
          set -euo pipefail
          INSTALL_DIR="${{ runner.temp }}/sing-box"
          mkdir -p "$INSTALL_DIR"

          if [ ! -f "$INSTALL_DIR/sing-box" ]; then
            curl -fsSL "https://github.com/sagernet/sing-box/releases/download/v1.9.1/sing-box-1.9.1-linux-amd64.tar.gz" \
              | tar xz -C "$INSTALL_DIR" --strip-components=1
          fi

          chmod +x "$INSTALL_DIR/sing-box"
          "$INSTALL_DIR/sing-box" version
          echo "$INSTALL_DIR" >> "$GITHUB_PATH"

      - name: Create venv
        run: uv venv .venv

      - name: Install dependencies
        run: uv sync --python .venv/bin/python

      - name: Ensure cache directory
        run: mkdir -p cache

      - name: Generate
        env:
          TARGET_BRANCH: generated
        run: |
          .venv/bin/python src/generate_rules.py \
            --source-root rules \
            --output-root generated \
            --ruleset-baseline mihomo \
            --github-repo "${{ github.repository }}" \
            --publish-branch "$TARGET_BRANCH"

      - name: Commit and push
        id: publish
        env:
          TARGET_BRANCH: generated
        run: |
          set -euo pipefail

          PUBLISH_ROOT=generated
          if [ ! -d "$PUBLISH_ROOT" ]; then
            echo "Publish root does not exist: $PUBLISH_ROOT" >&2
            exit 1
          fi

          PUBLISH_DIR="$(mktemp -d)"
          cleanup() {
            rm -rf "$PUBLISH_DIR"
          }
          trap cleanup EXIT

          cp -a "$PUBLISH_ROOT"/. "$PUBLISH_DIR"/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi

          # Ensure artifacts are published directly at branch root (no nested generated/).
          rm -rf generated

          for entry in "$PUBLISH_DIR"/* "$PUBLISH_DIR"/.[!.]* "$PUBLISH_DIR"/..?*; do
            [ -e "$entry" ] || continue
            name="$(basename "$entry")"
            [ "$name" = ".git" ] && continue
            cp -a "$entry" ./
          done

          # CI-only safeguard: if a previously published artifact becomes empty in this run,
          # keep the file path as an empty file to avoid external URL 404.
          while IFS= read -r tracked; do
            [ -n "$tracked" ] || continue
            if [ ! -f "$PUBLISH_DIR/$tracked" ] && [ -f "$tracked" ]; then
              : > "$tracked"
            fi
          done < <(
            git ls-files \
              '*.list' \
              '*.conf' \
              '*.yaml' \
              '*.json' \
              '*.srs'
          )

          # Whitelist mode: ignore everything except published artifacts.
          cat > .gitignore <<'EOF'
          *
          !*/
          !.gitignore
          !manifest.json
          !surge/**
          !mihomo/**
          !shadowrocket/**
          !loon/**
          !sing-box/**
          EOF

          git add -A .

          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: auto-generate rules"
          git push origin HEAD:"$TARGET_BRANCH"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Purge jsDelivr cache
        if: steps.publish.outputs.pushed == 'true'
        env:
          TARGET_BRANCH: generated
        run: |
          set -euo pipefail

          BASE_URL="https://purge.jsdelivr.net/gh/${{ github.repository }}@${TARGET_BRANCH}"

          # Purge only published artifacts and docs to avoid unnecessary requests.
          mapfile -t FILES < <(
            git ls-files \
              '*.list' \
              '*.conf' \
              '*.yaml' \
              '*.json' \
              '*.srs' \
              'README.MD' \
              '*/README.MD' \
              'manifest.json' \
              '.gitignore'
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No published files found, skip jsDelivr purge."
            exit 0
          fi

          failed=0
          for file in "${FILES[@]}"; do
            url="${BASE_URL}/${file}"
            attempt=1
            max_attempts=5

            while [ "$attempt" -le "$max_attempts" ]; do
              code="$(curl -sS -o /tmp/jsdelivr_purge_resp.txt -w '%{http_code}' "$url" || true)"

              if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "202" ] || [ "$code" = "204" ]; then
                echo "[PURGED] $url (HTTP $code)"
                break
              fi

              if [ "$code" = "429" ] || [[ "$code" =~ ^5[0-9][0-9]$ ]]; then
                backoff=$((attempt * 2))
                echo "[RETRY] $url (HTTP $code), sleeping ${backoff}s before retry ${attempt}/${max_attempts}"
                sleep "$backoff"
                attempt=$((attempt + 1))
                continue
              fi

              echo "[WARN] Purge failed for $url (HTTP ${code:-curl_error})"
              failed=$((failed + 1))
              break
            done

            if [ "$attempt" -gt "$max_attempts" ]; then
              echo "[WARN] Purge exhausted retries for $url"
              failed=$((failed + 1))
            fi

            # Throttle requests to reduce risk of rate-limiting.
            sleep 1
          done

          if [ "$failed" -gt 0 ]; then
            echo "[WARN] jsDelivr purge finished with $failed exhausted entries."
          fi
