name: Generate Rules

on:
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/generate-rules.yml"
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Restore runtime cache
        uses: actions/cache@v4
        with:
          path: cache
          key: rulesets-runtime-cache-${{ runner.os }}-v1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Install sing-box
        run: |
          go install github.com/sagernet/sing-box/cmd/sing-box@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Create venv
        run: uv venv .venv

      - name: Install dependencies
        run: uv sync --python .venv/bin/python

      - name: Ensure cache directory
        run: mkdir -p cache

      - name: Generate
        env:
          TARGET_BRANCH: generated
        run: |
          .venv/bin/python scripts/generate_rules.py \
            --source-root src \
            --output-root generated \
            --ruleset-baseline mihomo \
            --github-repo "${{ github.repository }}" \
            --publish-branch "$TARGET_BRANCH"

      - name: Commit and push
        env:
          TARGET_BRANCH: generated
        run: |
          bash scripts/publish_generated_branch.sh "$TARGET_BRANCH" generated generated
